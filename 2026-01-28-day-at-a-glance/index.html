<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Day at a Glance - Design Experiment</title>
    <link rel="stylesheet" href="../shared/back-to-index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="../shared/back-to-index.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            padding: 40px;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 48px;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 16px;
            font-weight: 400;
            color: #a0a0a0;
            line-height: 1.5;
        }

        /* 3-column grid layout */
        .timeline {
            position: relative;
            display: grid;
            grid-template-columns: 50px 28px 1fr;
            gap: 0 8px;
        }

        /* Each row is fixed height */
        .hour-row {
            display: contents;
        }

        /* Column 1: Hour number + timeline markers */
        .hour-col {
            position: relative;
            height: 100px;
            display: flex;
            align-items: flex-start;
            padding-top: 4px;
        }

        .hour-col::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 2px;
            background: #333;
        }

        .hour-col::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: -8px;
            height: 1px;
            background: #333;
        }

        .hour-num {
            font-size: 32px;
            font-weight: 700;
            color: #444;
            letter-spacing: -1px;
            line-height: 1;
        }

        /* Column 2: Colored bar with icon */
        .bar-col {
            position: relative;
            height: 100px;
            padding-top: 8px;
        }

        .bar-col::after {
            content: '';
            position: absolute;
            top: 0;
            left: -8px;
            right: -8px;
            height: 1px;
            background: #333;
        }

        .event-bar {
            width: 24px;
            height: 80px;
            border-radius: 12px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 10px;
        }

        .event-bar svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .event-bar.past {
            background: rgba(68, 68, 68, 0.95);
            color: #888;
        }

        .event-bar.shower {
            background: #3b82f6;
            color: #fff;
        }

        .event-bar.breakfast {
            background: #f59e0b;
            color: #fff;
        }

        .event-bar.email {
            background: #a855f7;
            color: #fff;
        }

        /* Column 3: Event card */
        .card-col {
            position: relative;
            height: 100px;
            padding-top: 8px;
        }

        .card-col::after {
            content: '';
            position: absolute;
            top: 0;
            left: -8px;
            right: 0;
            height: 1px;
            background: #333;
        }

        .event-card {
            background: rgba(42, 42, 42, 0.9);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            height: 80px;
            position: relative;
            z-index: 2;
        }

        .event-details {
            flex: 1;
        }

        .event-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .hour-row.past .event-title {
            color: #888;
        }

        .event-time {
            font-size: 13px;
            color: #666;
        }

        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #444;
            border-radius: 6px;
            flex-shrink: 0;
            cursor: pointer;
            position: relative;
        }

        .checkbox.checked {
            background: #ec4899;
            border-color: #ec4899;
        }

        .checkbox.checked::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 6px;
            width: 5px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .checkbox.blue { border-color: #3b82f6; }
        .checkbox.yellow { border-color: #f59e0b; }
        .checkbox.purple { border-color: #a855f7; }

        /* Now line - full width behind cards */
        .now-line {
            position: absolute;
            left: -40px;
            right: -40px;
            height: 1px;
            background: rgba(255, 100, 100, 0.5);
            z-index: 1;
            pointer-events: none;
        }

        .now-time {
            position: absolute;
            left: 0;
            top: -7px;
            font-size: 11px;
            font-weight: 600;
            color: #ff6b6b;
            white-space: nowrap;
        }

        /* Split bar - top half gray (slightly transparent), bottom half colored */
        .event-bar.split {
            background: linear-gradient(to bottom, rgba(68, 68, 68, 0.85) 50%, var(--bar-color) 50%);
        }

        .event-bar.split.shower {
            --bar-color: #3b82f6;
        }

        @media (max-width: 640px) {
            body {
                padding: 24px;
            }

            h1 {
                font-size: 36px;
            }

            .hour-num {
                font-size: 24px;
            }

            .event-title {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Your day at<br>a glance</h1>
            <p class="subtitle">Easily view your scheduled time blocks<br>in a clean and efficient timeline format.</p>
        </header>

        <div class="timeline">
            <!-- Row 1: 07 - Morning Workout -->
            <div class="hour-row past">
                <div class="hour-col">
                    <span class="hour-num">07</span>
                </div>
                <div class="bar-col">
                    <div class="event-bar past">
                        <svg viewBox="0 0 24 24"><path d="M4 17l4-4 4 4 8-8"/><path d="M4 17h4v4"/></svg>
                    </div>
                </div>
                <div class="card-col">
                    <div class="event-card">
                        <div class="event-details">
                            <div class="event-title">Morning Workout</div>
                            <div class="event-time">07:00 – 08:00 (1 hr)</div>
                        </div>
                        <div class="checkbox checked"></div>
                    </div>
                </div>
            </div>

            <!-- Row 2: 08 - Shower (current hour) -->
            <div class="hour-row">
                <div class="hour-col">
                    <span class="hour-num">08</span>
                </div>
                <div class="bar-col">
                    <div class="event-bar split shower">
                        <svg viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
                    </div>
                </div>
                <div class="card-col">
                    <div class="event-card">
                        <div class="event-details">
                            <div class="event-title">Shower</div>
                            <div class="event-time">08:00 – 09:00 (1 hr)</div>
                        </div>
                        <div class="checkbox blue"></div>
                    </div>
                </div>
            </div>

            <!-- Now line aligned with top of blue in shower bar -->
            <div class="now-line" style="top: 147px;"></div>

            <!-- Row 3: 09 - Breakfast -->
            <div class="hour-row">
                <div class="hour-col">
                    <span class="hour-num">09</span>
                </div>
                <div class="bar-col">
                    <div class="event-bar breakfast">
                        <svg viewBox="0 0 24 24"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/></svg>
                    </div>
                </div>
                <div class="card-col">
                    <div class="event-card">
                        <div class="event-details">
                            <div class="event-title">Breakfast</div>
                            <div class="event-time">09:00 – 10:00 (1 hr)</div>
                        </div>
                        <div class="checkbox yellow"></div>
                    </div>
                </div>
            </div>

            <!-- Row 4: 10 - Check Email -->
            <div class="hour-row">
                <div class="hour-col">
                    <span class="hour-num">10</span>
                </div>
                <div class="bar-col">
                    <div class="event-bar email">
                        <svg viewBox="0 0 24 24"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    </div>
                </div>
                <div class="card-col">
                    <div class="event-card">
                        <div class="event-details">
                            <div class="event-title">Check Email</div>
                            <div class="event-time">10:00 – 11:00 (1 hr)</div>
                        </div>
                        <div class="checkbox purple"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.checkbox').forEach(checkbox => {
            checkbox.addEventListener('click', function() {
                this.classList.toggle('checked');
            });
        });
    </script>
</body>
</html>
