<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminator - Text Scramble</title>
    <link rel="stylesheet" href="../shared/back-to-index.css">
    <script src="../shared/back-to-index.js" defer></script>
    <style>
        @font-face {
            font-family: 'Geist Pixel Square';
            src: url('https://unpkg.com/geist@1.7.0/dist/fonts/geist-pixel/GeistPixel-Square.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Space Mono';
            src: url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #cccccc;
            font-family: 'Space Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px;
            overflow: hidden;
        }

        #input-section {
            width: 520px;
            margin-bottom: 32px;
        }

        #text-input {
            width: 100%;
            height: 72px;
            background: #111111;
            border: 1px solid #333333;
            color: #cccccc;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            padding: 12px;
            resize: vertical;
            line-height: 1.6;
        }

        #text-input:focus {
            outline: none;
            border-color: #555555;
        }

        .button-group {
            margin-top: 8px;
            display: flex;
            gap: 8px;
        }

        button {
            background: #222222;
            border: 1px solid #444444;
            color: #cccccc;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            padding: 8px 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        button:hover {
            background: #333333;
            border-color: #666666;
        }

        button:active {
            background: #444444;
        }

        #scramble-container {
            width: 520px;
            cursor: pointer;
            font-size: 11px;
            line-height: 2.1;
            letter-spacing: 0.02em;
            text-align: left;
        }

        .scramble-line {
            position: relative;
            display: block;
        }

        .scramble-placeholder {
            visibility: hidden;
            display: block;
        }

        .scramble-text {
            position: absolute;
            top: 0;
            left: 0;
            color: #cccccc;
            display: block;
        }

        @media (max-width: 768px) {
            body {
                padding: 24px;
            }

            #scramble-container {
                font-size: 10px;
            }

            #input-section {
                margin-bottom: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="input-section">
        <textarea id="text-input" placeholder="Enter or paste text here..."></textarea>
        <div class="button-group">
            <button id="submit-btn">Submit</button>
            <button id="clear-btn">Clear</button>
        </div>
    </div>
    <div id="scramble-container"></div>

    <script>
        // Text Scramble Effect - Split-flap / Solari board style
        // Two phases: scramble-only hold, then resolve

        /**
         * Breaks text into lines with balanced character lengths
         * Automatically converts to uppercase for terminal aesthetic
         */
        function breakTextIntoLines(text) {
            // Convert to uppercase for terminal aesthetic
            text = text.toUpperCase();

            const words = text.split(/\s+/);
            const totalChars = text.length;
            const targetLinesCount = Math.ceil(totalChars / 75); // ~75 chars per line target
            const targetCharsPerLine = totalChars / targetLinesCount;

            const lines = [];
            let currentLine = [];
            let currentCharCount = 0;

            for (let i = 0; i < words.length; i++) {
                const word = words[i];
                const wordLength = word.length;
                const isLastWord = i === words.length - 1;

                // Add word to current line
                currentLine.push(word);
                currentCharCount += wordLength + (currentLine.length > 1 ? 1 : 0); // +1 for space

                // Calculate how close we are to target
                const distanceFromTarget = Math.abs(currentCharCount - targetCharsPerLine);
                const nextWord = words[i + 1];
                const nextWordLength = nextWord ? nextWord.length + 1 : 0;
                const distanceWithNextWord = Math.abs(currentCharCount + nextWordLength - targetCharsPerLine);

                // Break line if:
                // 1. Adding next word would be further from target, OR
                // 2. We're at natural punctuation and close enough to target, OR
                // 3. This is the last word
                const endsWithPunctuation = /[.!?:;]$/.test(word);
                const closeToTarget = distanceFromTarget < targetCharsPerLine * 0.3;

                if (isLastWord ||
                    (!isLastWord && distanceWithNextWord > distanceFromTarget) ||
                    (endsWithPunctuation && closeToTarget && currentCharCount > targetCharsPerLine * 0.7)) {
                    lines.push(currentLine.join(' '));
                    currentLine = [];
                    currentCharCount = 0;
                }
            }

            // Add any remaining words
            if (currentLine.length > 0) {
                lines.push(currentLine.join(' '));
            }

            return lines;
        }

        class TextScramble {
            constructor(el) {
                this.el = el;
                this.intervalId = null;
                this.resolveCallback = null;
                this.isResolving = false;
            }

            // Phase 1: Just scramble, no resolving
            scramble(finalText) {
                this.finalText = finalText;
                this.resolved = 0;
                this.isResolving = false;

                if (this.intervalId) clearInterval(this.intervalId);
                this.intervalId = setInterval(() => this.tick(), 20);
            }

            // Phase 2: Start resolving
            resolve() {
                return new Promise(resolve => {
                    this.resolveCallback = resolve;
                    this.isResolving = true;
                });
            }

            tick() {
                // Only increment resolved if we're in resolve phase
                if (this.isResolving && this.resolved < this.finalText.length) {
                    this.resolved += 3;
                }

                // Build output string
                let output = '';
                const allChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                const upperChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                const numChars = '0123456789';

                for (let i = 0; i < this.finalText.length; i++) {
                    if (i < this.resolved) {
                        // This position is resolved - show final char (including spaces)
                        output += this.finalText[i];
                    } else {
                        const finalChar = this.finalText[i];
                        // Spaces and punctuation become letters/numbers during scramble
                        if (finalChar === ' ' || /[.,!?:;]/.test(finalChar)) {
                            output += allChars[Math.floor(Math.random() * allChars.length)];
                        } else if (finalChar >= '0' && finalChar <= '9') {
                            output += numChars[Math.floor(Math.random() * numChars.length)];
                        } else {
                            // All letters use uppercase scramble
                            output += upperChars[Math.floor(Math.random() * upperChars.length)];
                        }
                    }
                }

                this.el.textContent = output;

                // Check if complete
                if (this.isResolving && this.resolved >= this.finalText.length) {
                    clearInterval(this.intervalId);
                    this.intervalId = null;
                    if (this.resolveCallback) this.resolveCallback();
                }
            }

            stop() {
                if (this.intervalId) {
                    clearInterval(this.intervalId);
                    this.intervalId = null;
                }
            }
        }

        // Default source text - Ghost in the Shell reflection on identity and consciousness
        const defaultText = `There are countless ingredients that make up the human body and mind, like all the components that make up me as an individual with my own personality. Sure I have a face and voice to distinguish myself from others, but my thoughts and memories are unique only to me, and I carry a sense of my own destiny. Each of those things are just a small part of it. I collect information to use in my own way. All of that blends to create a mixture that forms me and gives rise to my conscience. I feel confined, only free to expand myself within boundaries.`;

        let sourceText = defaultText;
        let lines = []; // Will be populated dynamically by breakTextIntoLines()

        const container = document.getElementById('scramble-container');
        let scrambleInstances = [];
        let lineElements = [];

        // Build the DOM structure
        function buildLines() {
            // Generate lines dynamically if not already calculated
            if (!lines.length) {
                lines = breakTextIntoLines(sourceText);
            }

            container.innerHTML = '';
            lineElements = [];

            lines.forEach((text, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'scramble-line';

                const placeholder = document.createElement('span');
                placeholder.className = 'scramble-placeholder';
                placeholder.textContent = text;

                const animated = document.createElement('span');
                animated.className = 'scramble-text';
                animated.dataset.text = text;
                animated.id = `line-${i}`;

                wrapper.appendChild(placeholder);
                wrapper.appendChild(animated);
                container.appendChild(wrapper);

                lineElements.push(animated);
            });
        }

        function runScramble() {
            // Stop any running animations
            scrambleInstances.forEach(s => s.stop());
            scrambleInstances = [];

            // Phase 1: Start ALL lines scrambling immediately
            lineElements.forEach((el) => {
                const scramble = new TextScramble(el);
                scrambleInstances.push(scramble);
                scramble.scramble(el.dataset.text);
            });

            // Phase 2: After 1 second of scrambling, resolve lines sequentially
            setTimeout(() => {
                let currentLine = 0;

                function resolveNextLine() {
                    if (currentLine < scrambleInstances.length) {
                        scrambleInstances[currentLine].resolve().then(() => {
                            currentLine++;
                            resolveNextLine();
                        });
                    }
                }

                resolveNextLine();
            }, 1000); // 1 second of pure scramble before resolve
        }

        // Update text and rebuild animation
        function updateText(newText) {
            sourceText = newText;
            lines = []; // Reset lines array to trigger recalculation
            buildLines();
            runScramble();
        }

        // Submit button handler
        const submitBtn = document.getElementById('submit-btn');
        const clearBtn = document.getElementById('clear-btn');
        const textInput = document.getElementById('text-input');

        submitBtn.addEventListener('click', () => {
            const inputText = textInput.value.trim();
            if (inputText) {
                updateText(inputText);
            }
        });

        // Clear button handler - reset to default text
        clearBtn.addEventListener('click', () => {
            textInput.value = '';
            updateText(defaultText);
        });

        // Allow Enter key in textarea (Shift+Enter submits)
        textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.shiftKey) {
                e.preventDefault();
                submitBtn.click();
            }
        });

        // Build and start with default text
        buildLines();
        setTimeout(runScramble, 500);

        // Click to replay current text
        container.addEventListener('click', runScramble);
    </script>
</body>
</html>
