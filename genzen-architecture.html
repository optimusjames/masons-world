<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenZen Architecture Explorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 280px; min-width: 280px; background: #161822; border-right: 1px solid #2d3148; display: flex; flex-direction: column; overflow-y: auto; }
  .sidebar h1 { font-size: 15px; padding: 16px 16px 4px; color: #94a3b8; font-weight: 600; letter-spacing: 0.03em; }
  .sidebar h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; padding: 16px 16px 8px; font-weight: 600; }

  /* Flow selector */
  .flow-buttons { padding: 0 12px; display: flex; flex-direction: column; gap: 4px; }
  .flow-btn { background: #1e2035; border: 1px solid #2d3148; color: #94a3b8; padding: 10px 12px; border-radius: 6px; cursor: pointer; text-align: left; font-size: 13px; transition: all 0.15s; }
  .flow-btn:hover { border-color: #4a5180; color: #e2e8f0; }
  .flow-btn.active { border-color: #6366f1; color: #e2e8f0; background: #1e1e3a; }
  .flow-btn .flow-label { font-weight: 600; display: block; }
  .flow-btn .flow-desc { font-size: 11px; color: #64748b; margin-top: 2px; display: block; }
  .flow-btn.active .flow-desc { color: #818cf8; }

  /* Layer toggles */
  .layer-toggles { padding: 0 16px; display: flex; flex-direction: column; gap: 6px; }
  .layer-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: #94a3b8; }
  .layer-toggle input { display: none; }
  .layer-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid; transition: all 0.15s; }
  .layer-toggle input:checked ~ .layer-dot { background: currentColor; }
  .layer-toggle:hover { color: #e2e8f0; }

  /* Detail panel */
  .detail-panel { margin: 12px; background: #1e2035; border: 1px solid #2d3148; border-radius: 8px; padding: 12px; font-size: 12px; line-height: 1.6; flex-shrink: 0; }
  .detail-panel h3 { font-size: 13px; margin-bottom: 6px; }
  .detail-panel .detail-tag { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 3px; margin-right: 4px; margin-bottom: 3px; font-family: 'SF Mono', 'Fira Code', monospace; }
  .detail-panel .detail-section { margin-top: 8px; }
  .detail-panel .detail-section strong { color: #94a3b8; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 3px; }
  .detail-panel code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; background: #0f1117; padding: 1px 4px; border-radius: 3px; }

  /* Main canvas */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .canvas-wrap { flex: 1; position: relative; overflow: hidden; }
  svg { width: 100%; height: 100%; }

  /* Animated particles */
  .particle { fill: currentColor; opacity: 0; }
  .particle.active { animation: flowParticle var(--duration, 3s) linear infinite; }
  @keyframes flowParticle { 0% { opacity: 0; } 5% { opacity: 0.9; } 90% { opacity: 0.9; } 100% { opacity: 0; } }

  /* Node styles */
  .node-group { cursor: pointer; transition: transform 0.15s; }
  .node-group:hover .node-rect { filter: brightness(1.2); stroke-width: 2; }
  .node-group.highlighted .node-rect { stroke-width: 2.5; filter: brightness(1.3); }
  .node-group.dimmed { opacity: 0.15; }
  .node-rect { rx: 8; ry: 8; transition: all 0.2s; }
  .node-title { font-size: 12px; font-weight: 600; fill: #e2e8f0; pointer-events: none; }
  .node-subtitle { font-size: 9.5px; fill: #94a3b8; pointer-events: none; font-family: 'SF Mono', monospace; }
  .node-icon { font-size: 18px; pointer-events: none; }

  /* Connection styles */
  .connection { fill: none; stroke-width: 1.5; transition: opacity 0.3s; }
  .connection.dimmed { opacity: 0.06; }
  .connection.highlighted { stroke-width: 2.5; opacity: 1; }
  .conn-label { font-size: 9px; fill: #64748b; pointer-events: none; font-family: 'SF Mono', monospace; }
  .conn-label.highlighted { fill: #e2e8f0; font-weight: 600; }

  /* Prompt bar */
  .prompt-bar { background: #161822; border-top: 1px solid #2d3148; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
  .prompt-text { flex: 1; font-size: 12px; color: #94a3b8; font-family: 'SF Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .copy-btn { background: #6366f1; color: white; border: none; padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .copy-btn:hover { background: #818cf8; }

  /* Legend */
  .legend { position: absolute; bottom: 12px; left: 12px; background: #161822ee; border: 1px solid #2d3148; border-radius: 8px; padding: 10px 14px; font-size: 10px; display: flex; gap: 14px; }
  .legend-item { display: flex; align-items: center; gap: 5px; color: #64748b; }
  .legend-line { width: 20px; height: 2px; }
  .legend-dash { width: 20px; height: 0; border-top: 2px dashed; }

  /* Step indicator */
  .step-indicator { position: absolute; top: 12px; right: 12px; background: #161822ee; border: 1px solid #2d3148; border-radius: 8px; padding: 10px 14px; font-size: 11px; max-width: 320px; }
  .step-indicator .step-title { font-weight: 600; color: #e2e8f0; margin-bottom: 6px; }
  .step-list { list-style: none; }
  .step-list li { padding: 3px 0; color: #64748b; display: flex; align-items: flex-start; gap: 6px; }
  .step-list li.active-step { color: #e2e8f0; }
  .step-num { display: inline-flex; width: 16px; height: 16px; border-radius: 50%; background: #2d3148; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
  .step-list li.active-step .step-num { background: #6366f1; color: white; }

  /* Pulse animation for active nodes */
  .pulse-ring { opacity: 0; }
  .pulse-ring.active { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.08); } }

  /* Scrollbar */
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 2px; }
</style>
</head>
<body>

<div class="sidebar">
  <h1>GenZen Architecture</h1>
  <h2>Flow View</h2>
  <div class="flow-buttons">
    <button class="flow-btn active" data-flow="generation" onclick="setFlow('generation')">
      <span class="flow-label">AI Image Generation</span>
      <span class="flow-desc">Prompt to pixels via FAL queue</span>
    </button>
    <button class="flow-btn" data-flow="upload" onclick="setFlow('upload')">
      <span class="flow-label">Image Upload</span>
      <span class="flow-desc">File to storage with palette extraction</span>
    </button>
    <button class="flow-btn" data-flow="auth" onclick="setFlow('auth')">
      <span class="flow-label">Authentication</span>
      <span class="flow-desc">Login, sessions, RLS enforcement</span>
    </button>
    <button class="flow-btn" data-flow="overview" onclick="setFlow('overview')">
      <span class="flow-label">Full System</span>
      <span class="flow-desc">All connections at a glance</span>
    </button>
  </div>

  <h2>Layers</h2>
  <div class="layer-toggles" id="layerToggles"></div>

  <h2>Selected Component</h2>
  <div class="detail-panel" id="detailPanel">
    <div style="color:#64748b;">Click any node to inspect</div>
  </div>
</div>

<div class="main">
  <div class="canvas-wrap">
    <svg id="canvas" viewBox="0 0 900 580"></svg>
    <div class="legend" id="legend"></div>
    <div class="step-indicator" id="stepIndicator"></div>
  </div>
  <div class="prompt-bar">
    <div class="prompt-text" id="promptText">Select a flow to explore the GenZen architecture.</div>
    <button class="copy-btn" onclick="copyPrompt()">Copy</button>
  </div>
</div>

    box:     'M20.54 5.23l-1.39-1.68C18.88 3.21 18.47 3 18 3H6c-.47 0-.88.21-1.16.55L3.46 5.23C3.17 5.57 3 6.02 3 6.5V19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6.5c0-.48-.17-.93-.46-1.27zM12 17.5L6.5 12H10v-2h4v2h3.5L12 17.5z',

    cloud:   'M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z',

  return icons[type] || icons.grid;
}

// ─── RENDER ───────────────────────────────────────────────

function render() {
  renderLayers();
  renderCanvas();
  renderSteps();
  renderDetail();
  updatePrompt();
}

function renderLayers() {
  const el = document.getElementById('layerToggles');
  el.innerHTML = Object.entries(LAYERS).map(([id, l]) => `
    <label class="layer-toggle" style="color:${l.color}">
      <input type="checkbox" ${state.layers[id] ? 'checked' : ''} onchange="toggleLayer('${id}', this.checked)">
      <span class="layer-dot" style="border-color:${l.color}"></span>
      ${l.label}
    </label>
  `).join('');
}

function renderCanvas() {
  const svg = document.getElementById('canvas');
  const flowConns = CONNECTIONS.filter(c => c.flows.includes(state.flow));
  const activeNodeIds = new Set();
  flowConns.forEach(c => { activeNodeIds.add(c.from); activeNodeIds.add(c.to); });

  // Markers
  let html = '<defs>';
  Object.entries(CONN_STYLES).forEach(([type, s]) => {
    html += `<marker id="arrow-${type}" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="${s.color}"/>
    </marker>`;
  });
  html += '</defs>';

  // Layer bands
  const bands = [
    { y: 30, h: 150, label: 'CLIENT', layer: 'client' },
    { y: 190, h: 80,  label: 'SERVER', layer: 'server' },
    { y: 310, h: 160, label: 'SUPABASE', layer: 'supabase' },
    { y: 470, h: 80,  label: 'EXTERNAL', layer: 'fal' },
  ];
  bands.forEach(b => {
    const layerColor = b.layer === 'fal' ? '#c084fc' : LAYERS[b.layer]?.color || '#64748b';
    html += `<rect x="0" y="${b.y}" width="900" height="${b.h}" fill="${layerColor}" opacity="0.03" rx="0"/>`;
    html += `<text x="12" y="${b.y + 14}" fill="${layerColor}" opacity="0.25" font-size="9" font-weight="700" letter-spacing="0.1em">${b.label}</text>`;
  });

  // Connections
  flowConns.forEach(c => {
    const from = NODES.find(n => n.id === c.from);
    const to = NODES.find(n => n.id === c.to);
    if (!from || !to) return;
    if (!state.layers[from.layer] || !state.layers[to.layer]) return;

    const style = CONN_STYLES[c.type];
    const x1 = from.x + from.w/2, y1 = from.y + from.h/2;
    const x2 = to.x + to.w/2, y2 = to.y + to.h/2;

    // Bezier control points
    const dy = y2 - y1;
    const dx = x2 - x1;
    const cx1 = x1 + dx * 0.1, cy1 = y1 + dy * 0.5;
    const cx2 = x2 - dx * 0.1, cy2 = y2 - dy * 0.5;

    const isHighlighted = state.selectedNode && (c.from === state.selectedNode || c.to === state.selectedNode);
    const isDimmed = state.selectedNode && !isHighlighted;

    const pathId = `path-${c.from}-${c.to}`;
    html += `<path id="${pathId}" class="connection ${isHighlighted ? 'highlighted' : ''} ${isDimmed ? 'dimmed' : ''}"
      d="M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}"
      stroke="${style.color}" stroke-dasharray="${style.dash}"
      marker-end="url(#arrow-${c.type})" opacity="${isDimmed ? 0.06 : 0.5}"
      data-from="${c.from}" data-to="${c.to}"/>`;

    // Label
    const mx = (x1+x2)/2, my = (y1+y2)/2;
    if (c.label && !isDimmed) {
      html += `<text class="conn-label ${isHighlighted ? 'highlighted' : ''}" x="${mx}" y="${my - 6}" text-anchor="middle">${c.label}</text>`;
    }

    // Animated particle
    if (state.animating && !isDimmed) {
      const delay = Math.random() * 2;
      html += `<circle r="3" fill="${style.color}" opacity="0">
        <animateMotion dur="3s" repeatCount="indefinite" begin="${delay}s">
          <mpath href="#${pathId}"/>
        </animateMotion>
        <animate attributeName="opacity" values="0;0.8;0.8;0" dur="3s" repeatCount="indefinite" begin="${delay}s"/>
      </circle>`;
    }
  });

  // Nodes
  NODES.forEach(n => {
    if (!state.layers[n.layer]) return;
    const color = LAYERS[n.layer].color;
    const isInFlow = state.flow === 'overview' || activeNodeIds.has(n.id);
    const isSelected = state.selectedNode === n.id;
    const isDimmed = state.flow !== 'overview' && !isInFlow;

    html += `<g class="node-group ${isSelected ? 'highlighted' : ''} ${isDimmed ? 'dimmed' : ''}"
      onclick="selectNode('${n.id}')" data-id="${n.id}">`;

    // Pulse ring for selected
    if (isSelected) {
      html += `<rect class="pulse-ring active" x="${n.x-3}" y="${n.y-3}" width="${n.w+6}" height="${n.h+6}" rx="10" fill="none" stroke="${color}" stroke-width="2"/>`;
    }

    // Background
    html += `<rect class="node-rect" x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}"
      fill="${color}10" stroke="${color}" stroke-width="${isSelected ? 2.5 : 1}" opacity="${isDimmed ? 0.3 : 1}"/>`;

    // Icon
    const iconScale = 0.55;
    html += `<g transform="translate(${n.x + 8}, ${n.y + n.h/2 - 7}) scale(${iconScale})">
      <path d="${iconPath(n.icon)}" fill="${color}" opacity="0.7"/>
    </g>`;

    // Text
    html += `<text class="node-title" x="${n.x + 24}" y="${n.y + 19}">${n.label}</text>`;
    html += `<text class="node-subtitle" x="${n.x + 24}" y="${n.y + 33}">${n.subtitle.length > 28 ? n.subtitle.slice(0,26)+'...' : n.subtitle}</text>`;

    html += '</g>';
  });

  svg.innerHTML = html;

  // Legend
  const legend = document.getElementById('legend');
  legend.innerHTML = Object.entries(CONN_STYLES).map(([type, s]) =>
    `<div class="legend-item">
      <div class="${s.dash ? 'legend-dash' : 'legend-line'}" style="border-color:${s.color};background:${s.dash ? 'none' : s.color}"></div>
      ${s.label}
    </div>`
  ).join('');
}

function renderSteps() {
  const el = document.getElementById('stepIndicator');
  const steps = FLOW_STEPS[state.flow];
  if (!steps || steps.length === 0) {
    el.innerHTML = '<div class="step-title">All Connections</div><div style="color:#64748b;font-size:11px;">Every service relationship shown. Select a specific flow to see the step-by-step sequence.</div>';
    return;
  }

  const flowNames = { generation: 'AI Generation Flow', upload: 'Upload Flow', auth: 'Auth Flow' };
  el.innerHTML = `
    <div class="step-title">${flowNames[state.flow] || 'Flow'}</div>
    <ol class="step-list">
      ${steps.map((s, i) => `<li class="${i === state.activeStep ? 'active-step' : ''}"><span class="step-num">${i+1}</span>${s}</li>`).join('')}
    </ol>
  `;
}

function renderDetail() {
  const el = document.getElementById('detailPanel');
  if (!state.selectedNode) {
    el.innerHTML = '<div style="color:#64748b;">Click any node to inspect</div>';
    return;
  }

  const d = NODE_DETAILS[state.selectedNode];
  if (!d) { el.innerHTML = '<div style="color:#64748b;">No details available</div>'; return; }

  const node = NODES.find(n => n.id === state.selectedNode);
  const color = LAYERS[node.layer].color;

  el.innerHTML = `
    <h3 style="color:${color}">${d.title}</h3>
    <div>${d.tags.map(t => `<span class="detail-tag" style="background:${color}20;color:${color}">${t}</span>`).join('')}</div>
    <div class="detail-section" style="color:#c8d0df;">${d.desc}</div>
    <div class="detail-section"><strong>Data Shapes</strong>${d.data.map(x => `<div><code>${x}</code></div>`).join('')}</div>
    <div class="detail-section"><strong>Security</strong><div style="color:#fbbf24;">${d.security}</div></div>
  `;
}

function updatePrompt() {
  const el = document.getElementById('promptText');
  const parts = [];

  const flowDescs = {
    generation: 'the AI image generation flow (prompt submission through FAL queue to completed image)',
    upload: 'the image upload flow (file selection through storage to grid display)',
    auth: 'the authentication flow (login through session management to RLS enforcement)',
    overview: 'the full system architecture with all service connections',
  };

  parts.push(`Exploring ${flowDescs[state.flow]}.`);

  const hidden = Object.entries(state.layers).filter(([,v]) => !v).map(([k]) => LAYERS[k].label);
  if (hidden.length) parts.push(`Hidden layers: ${hidden.join(', ')}.`);

  if (state.selectedNode) {
    const d = NODE_DETAILS[state.selectedNode];
    if (d) parts.push(`Inspecting ${d.title}: ${d.desc.split('.')[0]}.`);
  }

  el.textContent = parts.join(' ');
}

// ─── INTERACTIONS ─────────────────────────────────────────

function setFlow(flow) {
  state.flow = flow;
  state.activeStep = 0;
  state.selectedNode = null;
  document.querySelectorAll('.flow-btn').forEach(b => b.classList.toggle('active', b.dataset.flow === flow));
  startStepAnimation();
  render();
}

function toggleLayer(id, checked) {
  state.layers[id] = checked;
  render();
}

function selectNode(id) {
  state.selectedNode = state.selectedNode === id ? null : id;
  render();
}

function startStepAnimation() {
  clearInterval(stepTimer);
  const steps = FLOW_STEPS[state.flow];
  if (!steps || steps.length === 0) return;
  stepTimer = setInterval(() => {
    state.activeStep = (state.activeStep + 1) % steps.length;
    renderSteps();
  }, 2500);
}

function copyPrompt() {
  const text = document.getElementById('promptText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

// ─── INIT ─────────────────────────────────────────────────
render();
startStepAnimation();
</script>
</body>
</html>
