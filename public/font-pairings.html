  }

  .card-wrapper {

    cursor: pointer;
  }

  .card {
    border-radius: 14px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card.flipped {
    transform: rotateY(180deg);
  }

  .card-wrapper:hover .card:not(.flipped) {
    transform: translateY(-3px);
  }

  .card-wrapper:hover .card.flipped {
    transform: rotateY(180deg) translateY(-3px);
  }

  .card-front, .card-back {
    border-radius: 14px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  .card-front {
    position: relative;
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
    min-height: 380px;
  }

  .card-back {
    position: absolute;
    inset: 0;
    transform: rotateY(180deg);
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
  }

  .back-label {
    font-family: 'Albert Sans', sans-serif;

    font-size: 0.72rem;
    line-height: 1.75;
    opacity: 0.8;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .spec-block strong {
    font-weight: 600;
    opacity: 1;
  }

  .copy-icon {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 30px;
    height: 30px;
    border: none;
    border-radius: 7px;
    background: rgba(255,255,255,0.06);
    color: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s ease, background 0.2s ease;
    z-index: 2;
  }

  .card-front:hover .copy-icon,
  .card-back .copy-icon {
    opacity: 0.5;
  }

  .copy-icon:hover {
    opacity: 1 !important;
    background: rgba(255,255,255,0.14);
  }

  .copy-icon:active {
    transform: scale(0.9);
  }

  .copy-icon svg {
    width: 15px;
    height: 15px;
  }

    pointer-events: none;
    z-index: 100;

function buildCard(p, i) {
  const num = String(i + 1).padStart(2, '0');
  const name = p.heading === p.body ? p.heading : `${p.heading} + ${p.body}`;
  const spec = `Font pairing: ${name}\nHeading: ${p.heading} (weights: ${p.hWeights})\nBody: ${p.body} (weights: ${p.bWeights})\nClassification: ${p.classification}\nGoogle Fonts: https://fonts.googleapis.com/css2?family=${encodeURIComponent(p.heading).replace(/%20/g, '+')}:wght@${p.hWeights.replace(/[^\d,]/g, '').split(',').join(';')}&family=${encodeURIComponent(p.body).replace(/%20/g, '+')}:wght@${p.bWeights.replace(/[^\d,]/g, '').split(',').join(';')}&display=swap`;

  const specDisplay = `<strong>Font pairing: ${name}</strong>\nHeading: ${p.heading} (weights: ${p.hWeights})\nBody: ${p.body} (weights: ${p.bWeights})\nClassification: ${p.classification}`;

  const copySvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
  const checkSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

  const wrapper = document.createElement('div');
  wrapper.className = 'card-wrapper';

  wrapper.innerHTML = `
    <div class="card">
      <div class="card-front" style="background:${p.bg};color:${p.fg}">
        <button class="copy-icon" title="Copy font spec">${copySvg}</button>
        <div class="card-number">${num}</div>
        <div class="pairing-name">${name}</div>
        <h2 class="heading-sample" style="${p.hStyle}">${p.quote}</h2>
        <p class="body-sample" style="${p.bStyle}">${p.text}</p>
      </div>
      <div class="card-back" style="background:${p.bg};color:${p.fg}">
        <button class="copy-icon" title="Copy font spec">${copySvg}</button>
        <div class="back-label">Font Spec</div>
        <div class="spec-block">${specDisplay}</div>
      </div>
    </div>
  `;

  const card = wrapper.querySelector('.card');

  // Click card to flip (but not when clicking copy icon)
  wrapper.addEventListener('click', (e) => {
    if (e.target.closest('.copy-icon')) return;
    card.classList.toggle('flipped');
  });

  // Copy icon on both faces copies the spec
  wrapper.querySelectorAll('.copy-icon').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      navigator.clipboard.writeText(spec).then(() => {
        btn.innerHTML = checkSvg;
        const toast = document.getElementById('toast');
        toast.textContent = `Copied: ${name}`;
        toast.classList.add('visible');
        setTimeout(() => {
          toast.classList.remove('visible');
          btn.innerHTML = copySvg;
        }, 2000);
      });
    });
  });

  return wrapper;
}

const grid = document.getElementById('grid');
pairings.forEach((p, i) => grid.appendChild(buildCard(p, i)));
